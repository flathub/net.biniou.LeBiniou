app-id: net.biniou.LeBiniou
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: lebiniou
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --socket=wayland
  - --filesystem=xdg-run/pipewire-0:ro
  # used to send anonymous usage statistics
  - --share=network
  # users can put configuration and/or data files anywhere
  - --filesystem=home
  # needed to access the webcam
  - --device=all
cleanup:
  - /include
  - /lib/cmake
  - /lib/pkgconfig
  - /share/doc
  - /share/info
  - /share/man
  - /share/pixmaps
  - "*.la"
  - "*.a"
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node22
build-options:
  append-path: /usr/lib/sdk/node22/bin
modules:
  - name: microhttpd
    buildsystem: autotools
    sources:
      - type: archive
        url: https://ftp.gnu.org/gnu/libmicrohttpd/libmicrohttpd-1.0.5.tar.gz
        sha256: b46d00f58efa6f497b97d2e782c4ee66301d412ddd855dd3068518b3a2cd3ea2

  - name: jansson
    buildsystem: cmake-ninja
    config-opts:
      - -DJANSSON_BUILD_DOCS=OFF
    sources:
      - type: archive
        url: https://github.com/akheron/jansson/releases/download/v2.15.0/jansson-2.15.0.tar.gz
        sha256: 070a629590723228dc3b744ae90e965a569efb9c535b3309b52e80e75d8eb3be

  - name: imagemagick
    buildsystem: autotools
    config-opts:
      - --disable-docs
      - --without-magick-plus-plus
      - --without-dps
      - --without-freetype
      - --without-fontconfig
      - --without-heic
      - --without-pango
      - --without-x
      - --without-xml
    sources:
      - type: archive
        url: https://github.com/ImageMagick/ImageMagick/archive/refs/tags/7.1.2-22.tar.gz
        sha256: 78de50d00e3e7b6cce5e5751460d43feda626a778904438ab83a6b51449f9452

  - name: orcania
    buildsystem: cmake-ninja
    sources:
      - type: archive
        url: https://github.com/babelouest/orcania/archive/v2.3.3.tar.gz
        sha256: e26947f7622acf3660b71fb8018ee791c97376530ab6c4a00e4aa2775e052626

  - name: yder
    buildsystem: cmake-ninja
    config-opts:
      - -DDOWNLOAD_DEPENDENCIES=off
      - -DWITH_JOURNALD=off
      - -DINSTALL_HEADER=off
    sources:
      - type: archive
        url: https://github.com/babelouest/yder/archive/v1.4.20.tar.gz
        sha256: c1a7f2281514d0d0bba912b6b70f371d8c127ccfd644b8c438c9301a0fd4c5f2

  - name: ulfius
    buildsystem: cmake-ninja
    config-opts:
      - -DDOWNLOAD_DEPENDENCIES=off
      - -DWITH_YDER=off
      - -DBUILD_UWSC=off
    sources:
      - type: archive
        url: https://github.com/babelouest/ulfius/archive/refs/tags/v2.7.15.tar.gz
        sha256: 19cf789b2af1919b69f77c7701237bfc318a9781ec657b68fd4b6ffa9d53f111

  - name: lebiniou-data
    buildsystem: autotools
    config-opts:
      - --enable-flatpak
    sources:
      - type: git
        url: https://gitlab.com/lebiniou/lebiniou-data.git
        tag: version-3.67.0
        commit: 3f2dfa31bd65420f8508be5fc1e914207d9c94e8

  - name: lebiniou
    buildsystem: autotools
    build-options:
      cflags: -Wno-error
    config-opts:
      - --enable-flatpak
    sources:
      - type: git
        url: https://gitlab.com/lebiniou/lebiniou.git
        tag: version-3.67.0
        commit: 9243b251b4ee03f7f8035669383c3ea4faf7aa5a
      - type: patch
        path: lebiniou-appdata.patch
